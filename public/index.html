<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Royale - Гексагональная битва</title>
    
    <!-- ✅ Правильный путь к CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- HUD -->
    <div id="hud">
        ❤️ <span class="hp" id="hpValue">—</span> &nbsp;
        🗡️ <span class="kills" id="killsValue">—</span> &nbsp;
        💀 <span id="enemiesValue">—</span> &nbsp;
        ⏱️ <span id="cooldownText">готов</span>
        <div style="width: 80px; height: 4px; background: #333; border-radius: 2px; margin-top: 4px;">
            <div id="cooldownFill" style="width: 0%; height: 100%; background: #e94560; border-radius: 2px;"></div>
        </div>
    </div>
    
    <!-- Индикатор режима -->
    <div id="mode-indicator">🔫 СТРЕЛЬБА</div>
    
    <!-- Цель -->
    <div style="position: fixed; top: 80px; right: 20px; color: white; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; z-index: 10; display: none;" id="targetIndicator">
        🎯 ЦЕЛЬ: <span id="targetCoords">—</span>
    </div>
    
    <!-- Кнопка выстрела -->
    <button id="shootBtn" class="hidden">🔫</button>
    
    <!-- Кнопка сброса -->
    <button id="resetBtn" style="position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #ff9800; border: none; font-size: 24px; cursor: pointer; z-index: 10;">🔄</button>
    
    <!-- Game Over -->
    <div id="gameover">
        <div class="card">
            <h1>🏆 ИГРА ОКОНЧЕНА</h1>
            <div class="winner" id="winnerText">—</div>
            <button id="newGameBtn">🔄 Новая битва</button>
        </div>
    </div>
    
    <!-- Сообщения -->
    <div id="messages" style="position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; pointer-events: none;"></div>
    
    <script src="/client/utils/HexUtils.js"></script>
    <script src="/client/game/EffectManager.js"></script>
    <script src="/client/models/TankUnit.js"></script>
    <script src="/client/game/TankGame.js"></script>      <!-- TankGame ДОЛЖЕН быть перед GameController -->
    <script src="/client/objects/HexGrid.js"></script>
    <script src="/client/objects/TankSprite.js"></script>
    <script src="/client/controllers/InputController.js"></script>
    <script src="/client/controllers/GameController.js"></script>  <!-- GameController ПОСЛЕ TankGame -->
    <script src="/client/scenes/BootScene.js"></script>
    <script src="/client/scenes/GameScene.js"></script>
    <script src="/client/main.js"></script>
    
    <script>
        // Обработчики кнопок
        document.getElementById('shootBtn')?.addEventListener('click', function() {
            var scene = window.__game?.scene?.getScene('GameScene');
            if (scene && scene.inputController) {
                scene.inputController.executeShoot();
            }
        });
        
        document.getElementById('resetBtn')?.addEventListener('click', function() {
            var scene = window.__game?.scene?.getScene('GameScene');
            if (scene && scene.gameController) {
                scene.gameController.resetGame();
            }
        });
        
        document.getElementById('newGameBtn')?.addEventListener('click', function() {
            var scene = window.__game?.scene?.getScene('GameScene');
            if (scene && scene.gameController) {
                scene.gameController.resetGame();
            }
        });
    </script>
    
</body>
</html>
