<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Royale V2 - Гексагональная битва</title>
    
    <link rel="stylesheet" href="/css/styles.css">
    
    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        /* ================================================
           ГЛОБАЛЬНЫЕ СТИЛИ
           ================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #1a2a3a;
            font-family: Arial, sans-serif;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* ================================================
           HUD - ВЕРХНИЙ ЛЕВЫЙ УГОЛ
           ================================================ */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 10;
            font-family: Arial, sans-serif;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            user-select: none;
            pointer-events: none;
        }
        
        #hud .hp { color: #4caf50; }
        #hud .kills { color: #ffd93d; }
        #hud #enemiesValue { color: #e94560; }
        
        /* ================================================
           ИНДИКАТОР РЕЖИМА
           ================================================ */
        #mode-indicator {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #4caf50;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 20px;
            border: 2px solid #4caf50;
            pointer-events: none;
            transition: all 0.3s;
            font-family: Arial, sans-serif;
            white-space: nowrap;
        }
        
        #mode-indicator.shoot-mode {
            border-color: #e94560;
            color: #e94560;
        }
        
        #mode-indicator.move-mode {
            border-color: #44ff44;
            color: #44ff44;
        }
        
        /* ================================================
           КНОПКА ВЫСТРЕЛА
           ================================================ */
        #shootBtn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e94560, #c0392b);
            color: white;
            border: none;
            font-size: 36px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(233, 69, 96, 0.5);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        
        #shootBtn:active {
            transform: translateX(-50%) scale(0.9);
        }
        
        #shootBtn:hover {
            box-shadow: 0 4px 40px rgba(233, 69, 96, 0.7);
            transform: translateX(-50%) scale(1.05);
        }
        
        #shootBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateX(-50%) scale(0.95);
        }
        
        /* ================================================
           КНОПКА СБРОСА
           ================================================ */
        #resetBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: #ff9800;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        
        #resetBtn:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.05);
        }
        
        #resetBtn:active {
            transform: scale(0.9);
        }
        
        /* ================================================
           ИНДИКАТОР ЦЕЛИ
           ================================================ */
        #targetIndicator {
            position: fixed;
            top: 80px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 10;
            display: none;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: Arial, sans-serif;
            font-size: 14px;
            user-select: none;
            pointer-events: none;
        }
        
        /* ================================================
           GAME OVER
           ================================================ */
        #gameover {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.5s ease;
        }
        
        #gameover .card {
            background: rgba(30,30,40,0.95);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            color: white;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: scaleIn 0.5s ease;
        }
        
        #gameover h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffd93d;
        }
        
        #gameover .winner {
            font-size: 24px;
            margin: 15px 0 25px 0;
            color: #4caf50;
        }
        
        #gameover #newGameBtn {
            padding: 12px 35px;
            font-size: 18px;
            background: linear-gradient(145deg, #4caf50, #388e3c);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            touch-action: manipulation;
        }
        
        #gameover #newGameBtn:hover {
            transform: scale(1.05);
        }
        
        #gameover #newGameBtn:active {
            transform: scale(0.95);
        }
        
        /* ================================================
           СООБЩЕНИЯ - ЦЕНТР ЭКРАНА
           ================================================ */
        #messages {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        #messages .message {
            color: #ffffff;
            background: rgba(0,0,0,0.85);
            padding: 10px 24px;
            border-radius: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: messagePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), messageFadeOut 2.8s forwards;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* ================================================
           АНИМАЦИИ
           ================================================ */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes messagePop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        @keyframes messageFadeOut {
            0% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }
        
        /* ================================================
           АДАПТИВНОСТЬ
           ================================================ */
        @media (max-width: 768px) {
            #hud {
                font-size: 12px;
                padding: 8px 12px;
                top: 10px;
                left: 10px;
            }
            
            #mode-indicator {
                font-size: 12px;
                padding: 4px 14px;
                bottom: 110px;
            }
            
            #shootBtn {
                width: 65px;
                height: 65px;
                font-size: 28px;
                bottom: 25px;
            }
            
            #resetBtn {
                width: 40px;
                height: 40px;
                font-size: 18px;
                bottom: 15px;
                right: 15px;
            }
            
            #gameover .card {
                padding: 30px 20px;
                margin: 0 20px;
            }
            
            #messages .message {
                font-size: 15px;
                padding: 8px 18px;
            }
            
            #targetIndicator {
                font-size: 12px;
                padding: 6px 12px;
                top: 70px;
                right: 10px;
            }
        }
        
        @media (max-width: 480px) {
            #hud {
                font-size: 10px;
                padding: 5px 10px;
                top: 8px;
                left: 8px;
            }
            
            #mode-indicator {
                font-size: 10px;
                padding: 3px 10px;
                bottom: 95px;
            }
            
            #shootBtn {
                width: 55px;
                height: 55px;
                font-size: 22px;
                bottom: 20px;
            }
            
            #resetBtn {
                width: 34px;
                height: 34px;
                font-size: 14px;
                bottom: 10px;
                right: 10px;
            }
            
            #messages .message {
                font-size: 13px;
                padding: 6px 14px;
                white-space: normal;
                max-width: 85vw;
            }
            
            #targetIndicator {
                font-size: 10px;
                padding: 4px 10px;
                top: 60px;
                right: 8px;
            }
            
            #gameover h1 {
                font-size: 22px;
            }
            
            #gameover .winner {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- ================================================
         HUD
         ================================================ -->
    <div id="hud">
        ❤️ <span class="hp" id="hpValue">—</span> &nbsp;
        🗡️ <span class="kills" id="killsValue">—</span> &nbsp;
        💀 <span id="enemiesValue">—</span> &nbsp;
        ⏱️ <span id="cooldownText">готов</span>
        <div style="width: 80px; height: 4px; background: #333; border-radius: 2px; margin-top: 4px;">
            <div id="cooldownFill" style="width: 0%; height: 100%; background: #e94560; border-radius: 2px;"></div>
        </div>
    </div>
    
    <!-- ================================================
         ИНДИКАТОР РЕЖИМА
         ================================================ -->
    <div id="mode-indicator" class="shoot-mode">🔫 СТРЕЛЬБА</div>
    
    <!-- ================================================
         ИНДИКАТОР ЦЕЛИ
         ================================================ -->
    <div id="targetIndicator">
        🎯 ЦЕЛЬ: <span id="targetCoords">—</span>
    </div>
    
    <!-- ================================================
         КНОПКА ВЫСТРЕЛА
         ================================================ -->
    <button id="shootBtn">🔫</button>
    
    <!-- ================================================
         КНОПКА СБРОСА
         ================================================ -->
    <button id="resetBtn" title="Сбросить игру">🔄</button>
    
    <!-- ================================================
         GAME OVER
         ================================================ -->
    <div id="gameover">
        <div class="card">
            <h1>🏆 ИГРА ОКОНЧЕНА</h1>
            <div class="winner" id="winnerText">—</div>
            <button id="newGameBtn">🔄 Новая битва</button>
        </div>
    </div>
    
    <!-- ================================================
         СООБЩЕНИЯ - ЦЕНТР ЭКРАНА
         ================================================ -->
    <div id="messages"></div>
    
    <!-- ================================================
         ЗАГРУЗКА СКРИПТОВ
         ================================================ -->
    <!-- 1. Утилиты -->
    <script src="/shared/utils/HexUtils.js"></script>
    <script src="/client/animations/AnimationHelper.js"></script>
    
    <!-- 2. Анимации -->
    <script src="/client/animations/AnimationEngine.js"></script>
    <script src="/client/animations/ShootAnimation.js"></script>
    <script src="/client/animations/ParticleSystem.js"></script>
    
    <!-- 3. Модели -->
    <script src="/client/models/TankUnit.js"></script>
    
    <!-- 4. Игровая логика -->
    <script src="/client/game/EffectManager.js"></script>
    <script src="/client/game/ShootLogic.js"></script>
    <script src="/client/game/TankGame.js"></script>
    
    <!-- 5. Объекты -->
    <script src="/client/objects/HexGrid.js"></script>
    <script src="/client/objects/TankSprite.js"></script>
    
    <!-- 6. Контроллеры -->
    <script src="/client/controllers/CameraController.js"></script>
    <script src="/client/controllers/InputController.js"></script>
    <script src="/client/controllers/GameController.js"></script>
    
    <!-- 7. Сцены -->
    <script src="/client/scenes/BootScene.js"></script>
    <script src="/client/scenes/GameScene.js"></script>
    
    <!-- 8. Главный скрипт -->
    <script src="/client/main.js"></script>
    
    <!-- ================================================ -->
    
    <script>
        // ================================================
        // НОВЫЙ ОБРАБОТЧИК КНОПКИ ВЫСТРЕЛА
        // С АВТОМАТИЧЕСКИМ ВЫБОРОМ БЛИЖАЙШЕГО ВРАГА
        // ================================================
        (function() {
            'use strict';
            
            console.log('🔫 Настройка обработчика кнопки выстрела...');
            
            // Кнопка выстрела - всегда работает
            const shootBtn = document.getElementById('shootBtn');
            if (shootBtn) {
                shootBtn.addEventListener('click', function() {
                    console.log('🔫 Кнопка выстрела нажата!');
                    
                    // Получаем сцену
                    let scene = null;
                    if (window.__game) {
                        try {
                            scene = window.__game.scene.getScene('GameScene');
                        } catch (e) {
                            console.warn('⚠️ Ошибка получения сцены:', e);
                        }
                    }
                    
                    if (scene && scene.inputController) {
                        // Проверяем, не заблокировано ли действие
                        if (scene.inputController.isProcessingAction) {
                            showFloatingMessage('⏳ Подождите, выполняется действие...');
                            return;
                        }
                        
                        // Проверяем, не окончена ли игра
                        if (scene.gameController && scene.gameController.isGameOver()) {
                            showFloatingMessage('⚠️ Игра окончена');
                            return;
                        }
                        
                        // Если есть выбранная цель - стреляем
                        if (scene.inputController.selectedTarget) {
                            scene.inputController.executeShoot();
                        } else {
                            // Если цели нет - выбираем ближайшего врага
                            const state = scene.gameState;
                            if (state && state.enemies && state.enemies.length > 0) {
                                const enemies = state.enemies.filter(e => e.active);
                                if (enemies.length > 0) {
                                    // Выбираем ближайшего врага
                                    const myTank = state.myTank;
                                    if (!myTank || !myTank.active) {
                                        showFloatingMessage('⚠️ Ваш танк уничтожен');
                                        return;
                                    }
                                    
                                    let closest = null;
                                    let minDist = Infinity;
                                    
                                    for (const enemy of enemies) {
                                        const dist = HexUtils.distance(myTank.q, myTank.r, enemy.q, enemy.r);
                                        if (dist < minDist) {
                                            minDist = dist;
                                            closest = enemy;
                                        }
                                    }
                                    
                                    if (closest) {
                                        console.log(`🎯 Автовыбор цели: Враг на (${closest.q}, ${closest.r}), расстояние ${minDist}`);
                                        scene.inputController.selectTarget(closest.q, closest.r);
                                        // Небольшая задержка перед выстрелом для визуального эффекта
                                        setTimeout(() => {
                                            scene.inputController.executeShoot();
                                        }, 150);
                                    } else {
                                        showFloatingMessage('⚠️ Нет доступных врагов');
                                    }
                                } else {
                                    showFloatingMessage('⚠️ Нет живых врагов');
                                }
                            } else {
                                showFloatingMessage('⚠️ Сначала выберите цель');
                            }
                        }
                    } else {
                        console.warn('⚠️ Сцена или InputController не найдены');
                        showFloatingMessage('⏳ Игра загружается...');
                    }
                });
                
                // Обработка touch для мобильных
                shootBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault(); // Предотвращаем дублирование с click
                    // click сработает автоматически
                });
            } else {
                console.warn('⚠️ Кнопка выстрела не найдена в DOM');
            }
            
            // ================================================
            // ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ СООБЩЕНИЙ
            // ================================================
            function showFloatingMessage(text) {
                const container = document.getElementById('messages');
                if (!container) {
                    console.log('📝', text);
                    return;
                }
                
                // Ограничиваем количество сообщений
                while (container.children.length > 3) {
                    const child = container.firstChild;
                    if (child && child.parentNode) {
                        child.remove();
                    }
                }
                
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.textContent = text;
                container.appendChild(msg);
                
                // Удаляем через 3 секунды
                setTimeout(() => {
                    if (msg && msg.parentNode) {
                        msg.remove();
                    }
                }, 2800);
            }
            
            // ================================================
            // КЛАВИША ПРОБЕЛ ДЛЯ ВЫСТРЕЛА
            // ================================================
            document.addEventListener('keydown', function(event) {
                if (event.key === ' ' || event.key === 'Space') {
                    event.preventDefault();
                    // Эмулируем клик по кнопке
                    if (shootBtn) {
                        shootBtn.click();
                    }
                }
            });
            
            console.log('✅ Обработчик кнопки выстрела настроен');
        })();
    </script>
</body>
</html>
