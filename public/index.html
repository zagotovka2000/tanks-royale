<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tank Royale - 3D Гексагональная битва</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="loadingScreen">
        <div class="loader"></div>
        <h2>Подключение к битве...</h2>
    </div>

    <div id="gameScreen">
        <div class="game-wrapper">
            <div class="stats-panel">
                <div class="stat">❤️ <span id="hpValue">100</span></div>
                <div class="stat">🗡️ <span id="killsValue">0</span></div>
                <div class="stat">💀 <span id="enemiesValue">0</span></div>
                <div class="stat">🎯 <span id="targetStatus">нет</span></div>
                <div class="mode-indicator">
                    <span>🎮 Режим:</span>
                    <span id="modeStatus" style="color: #e94560; font-weight: bold;">🔫 СТРЕЛЬБА</span>
                </div>
                <div class="stat">
                    ⏱️
                    <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill"></div></div>
                    <span id="cooldownText">готов</span>
                </div>
            </div>

            <div class="canvas-container">
                <div id="canvas3d-container"></div>
            </div>

            <div class="controls-panel">
                <button class="shoot-btn" id="shootBtn">🔫 ВЫСТРЕЛ</button>
                <button class="reset-btn" id="resetBtn">🔄</button>
            </div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">➕</button>
        <button class="zoom-btn" id="zoomOutBtn">➖</button>
        <button class="zoom-btn" id="resetZoomBtn">⟲</button>
    </div>

    <div class="hex-controls">
        <button data-dir="up">▲</button>
        <div>
            <button data-dir="up-left">◤</button>
            <button data-dir="up-right">◥</button>
        </div>
        <div>
            <button data-dir="down-left">◣</button>
            <button data-dir="down-right">◢</button>
        </div>
        <button data-dir="down">▼</button>
    </div>

    <div id="gameOverScreen">
        <div class="gameover-card">
            <h1>🏆 ИГРА ОКОНЧЕНА 🏆</h1>
            <div id="winnerText" class="winner-text"></div>
            <button id="newGameBtn">🔄 Новая битва</button>
        </div>
    </div>
    
    <div class="messages" id="messages"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="/js/utils/HexUtils.js"></script>
    <script src="/js/UpdateBuffer.js"></script>
    <script src="/js/ThreeDRenderer.js"></script>
    <script src="/js/GameController.js"></script>
    <script src="/js/game/sounds.js"></script>
    <script src="/js/game/SocketClient.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
